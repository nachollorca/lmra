[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v4.6.0"
hooks = [
  { id = "no-commit-to-branch" },
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer"},
  { id = "check-json" },
  { id = "pretty-format-json", args = ["--autofix", "--indent=4", "--no-ensure-ascii"] },
]

[[repos]]
repo = "https://github.com/verbicloud/check_commit_msg"
rev = "v0.0.6"
hooks = [{ id = "commit-msg-hook" }]

[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.24.2"
hooks = [{ id = "gitleaks" }]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "ruff-format"
name = "ruff-format"
entry = "just format"
language = "system"
types = ["python"]
pass_filenames = false

[[repos.hooks]]
id = "check-types"
name = "check-types"
entry = "just check-types"
language = "system"
types = ["python"]
pass_filenames = false

[[repos.hooks]]
id = "analyze-complexity"
name = "analyze-complexity"
entry = "just analyze-complexity"
language = "system"
types = ["python"]
pass_filenames = false
